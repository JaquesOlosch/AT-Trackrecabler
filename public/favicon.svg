<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="96" y1="256" x2="416" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- Cable path -->
  <path
    d="M128 304 C 190 304, 198 208, 256 208 C 316 208, 318 304, 384 304"
    fill="none"
    stroke="url(#g)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#soft)"
  />

  <!-- Routing node -->
  <circle cx="256" cy="208" r="36" fill="#0f172a" stroke="url(#g)" stroke-width="18" filter="url(#soft)"/>

  <!-- Plug (left) -->
  <g filter="url(#soft)">
    <rect x="88" y="272" width="70" height="64" rx="18" fill="#0f172a" stroke="url(#g)" stroke-width="14"/>
    <rect x="156" y="286" width="26" height="36" rx="10" fill="url(#g)"/>
    <rect x="74" y="286" width="18" height="12" rx="6" fill="url(#g)"/>
    <rect x="74" y="314" width="18" height="12" rx="6" fill="url(#g)"/>
  </g>

  <!-- Output dot (right) -->
  <circle cx="392" cy="304" r="16" fill="url(#g)" filter="url(#soft)"/>
</svg>
