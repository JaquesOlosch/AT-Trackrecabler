name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test -- --run

      - name: Build
        env:
          GITHUB_PAGES: "true"
          VITE_AUDIOTOOL_REDIRECT_URL: "https://audiotool.github.io/recabler/"
          VITE_AUDIOTOOL_CLIENT_ID: ${{ secrets.VITE_AUDIOTOOL_CLIENT_ID }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
